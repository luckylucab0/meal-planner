services:
  backend:
    build: ./backend
    platform: linux/arm64
    env_file: .env
    volumes:
      - ./data:/data
    # Kein ports:-Block — Backend ist nur über das Docker-interne Netz
    # erreichbar (frontend → backend:8000). Direktzugriff von aussen
    # ist nicht mehr möglich; alle Anfragen laufen durch nginx/Basic-Auth.
    # init:true sorgt für sauberes Signal-Handling bei appuser (kein PID 1 Problem).
    # Volume-Permissions beim ersten Start sicherstellen:
    #   mkdir -p data/db data/logs && chown -R 1000:1000 data/
    init: true
    restart: unless-stopped

  frontend:
    build: ./frontend
    platform: linux/arm64
    # 127.0.0.1 bindet nur auf localhost des Pi — kein direkter LAN-Zugriff
    # auf den Docker-Port. Für LAN-Zugriff auf "0.0.0.0:3000:80" ändern
    # (dann ist Basic-Auth der einzige Schutz).
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
