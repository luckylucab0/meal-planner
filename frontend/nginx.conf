server {
    listen 80;
    server_name _;

    # Basic-Auth schützt die gesamte App; Health-Check ist ausgenommen
    # damit Docker-interne Checks ohne Credentials funktionieren.
    auth_basic           "meal-planner";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-Fallback — alle nicht-API-Routen liefern index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health-Check von Auth ausnehmen (Docker-Healthcheck, interne Monitoring).
    location = /api/health {
        auth_basic off;
        proxy_pass http://backend:8000/api/health;
    }

    # Backend-Proxy — vermeidet CORS, Frontend redet immer mit /api.
    # Auth wird durch den server-Block vererbt.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
